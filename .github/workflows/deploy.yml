name: Deploy to Vercel

on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: deploy-master
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/github-script@v7
        id: pr
        with:
          script: |
            const prs = await github.rest.repos.listPullRequestsAssociatedWithCommit({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha
            });

            if (!prs.data.length) {
              core.setOutput("should_deploy", "false");
              return;
            }

            const pr = prs.data[0];
            const labels = pr.labels.map(l => l.name.toLowerCase().trim());

            const shouldSkip = labels.includes("skip");

            core.setOutput("number", pr.number);
            core.setOutput("should_deploy", shouldSkip ? "false" : "true");

      - uses: actions/setup-node@v4
        if: steps.pr.outputs.should_deploy == 'true'
        with:
          node-version: 'lts/*'

      - run: npm ci
        if: steps.pr.outputs.should_deploy == 'true'

      - name: Deploy
        if: steps.pr.outputs.should_deploy == 'true'
        run: |
          npm install -g vercel@latest
          vercel pull --yes --environment=production --token=$VERCEL_TOKEN
          vercel build --prod --token=$VERCEL_TOKEN
          vercel deploy --prebuilt --prod --token=$VERCEL_TOKEN
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Comment PR
        if: steps.pr.outputs.should_deploy == 'true'
        uses: actions/github-script@v7
        env:
          PR_NUMBER: ${{ steps.pr.outputs.number }}
        with:
          script: |
            const prNumber = Number(process.env.PR_NUMBER);
            if (!prNumber) return;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: "🚀 Deployed to production"
            });