name: Deploy to Vercel

on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: deploy-master
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/github-script@v7
        id: pr
        with:
          script: |
            const prs = await github.rest.repos.listPullRequestsAssociatedWithCommit({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha
            });

            if (!prs.data.length) {
              core.setOutput("skip", "true");
              return;
            }

            const pr = prs.data[0];
            core.setOutput("number", pr.number);
            const labels = pr.labels.map(l => l.name.toLowerCase().trim());
            core.setOutput("labels", JSON.stringify(labels));

      - name: Skip if no PR
        if: steps.pr.outputs.skip == 'true'
        run: echo "No PR found, skipping deploy" && exit 0

      - name: Skip if label skip
        if: contains(fromJson(steps.pr.outputs.labels), 'skip')
        run: echo "Skipping deploy" && exit 0

      - uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'

      - run: npm ci

      - name: Deploy
        run: |
          npm install -g vercel@latest
          vercel pull --yes --environment=production --token=$VERCEL_TOKEN
          vercel build --prod --token=$VERCEL_TOKEN
          vercel deploy --prebuilt --prod --token=$VERCEL_TOKEN
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Comment PR
        if: steps.pr.outputs.number != ''
        uses: actions/github-script@v7
        env:
          PR_NUMBER: ${{ steps.pr.outputs.number }}
        with:
          script: |
            const prNumber = Number(process.env.PR_NUMBER);
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: "🚀 Deployed to production"
            });