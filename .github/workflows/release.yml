name: Release on Merge

on:
  push:
    branches: [master]

concurrency:
  group: release-master
  cancel-in-progress: false

jobs:
  release:
    if: "!startsWith(github.event.head_commit.message, 'chore(release):')"
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - uses: actions/github-script@v7
        id: pr
        with:
          script: |
            const prs = await github.rest.repos.listPullRequestsAssociatedWithCommit({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha
            });

            if (!prs.data.length) {
              core.setOutput("should_release", "false");
              return;
            }

            const pr = prs.data[0];
            const labels = pr.labels.map(l => l.name.toLowerCase().trim());

            const isBeta = labels.includes("beta");
            const shouldSkip = labels.includes("skip");

            core.setOutput("number", pr.number);
            core.setOutput("should_release", shouldSkip ? "false" : "true");
            core.setOutput("is_beta", isBeta ? "true" : "false");

      - uses: actions/setup-node@v4
        if: steps.pr.outputs.should_release == 'true'
        with:
          node-version: 'lts/*'
          registry-url: 'https://registry.npmjs.org'

      - run: npm ci
        if: steps.pr.outputs.should_release == 'true'

      - name: Bump version
        if: steps.pr.outputs.should_release == 'true'
        run: |
          if [ "${{ steps.pr.outputs.is_beta }}" = "true" ]; then
            npm version prerelease --preid=beta -m "chore(release): bump version to %s [skip ci]"
          else
            npm version patch -m "chore(release): bump version to %s [skip ci]"
          fi

      - name: Push version bump
        if: steps.pr.outputs.should_release == 'true'
        run: git push origin HEAD:master --follow-tags

      - name: Publish Beta
        if: steps.pr.outputs.should_release == 'true' && steps.pr.outputs.is_beta == 'true'
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if npm view "$VERSION" version 2>/dev/null; then
            echo "Version exists, skipping"
          else
            npm publish --tag beta --access public
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish Stable
        if: steps.pr.outputs.should_release == 'true' && steps.pr.outputs.is_beta == 'false'
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if npm view "$VERSION" version 2>/dev/null; then
            echo "Version exists, skipping"
          else
            npm publish --access public
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Comment PR
        if: steps.pr.outputs.should_release == 'true'
        uses: actions/github-script@v7
        env:
          PR_NUMBER: ${{ steps.pr.outputs.number }}
        with:
          script: |
            const prNumber = Number(process.env.PR_NUMBER);
            if (!prNumber) return;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: "🚀 Release completed"
            });