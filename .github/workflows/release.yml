name: Release on Merge

on:
  push:
    branches: [master]

concurrency:
  group: release-master
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/github-script@v7
        id: pr
        with:
          script: |
            const prs = await github.rest.repos.listPullRequestsAssociatedWithCommit({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha
            });

            if (!prs.data.length) {
              core.setOutput("skip", "true");
              return;
            }

            const pr = prs.data[0];
            core.setOutput("number", pr.number);
            const labels = pr.labels.map(l => l.name.toLowerCase().trim());
            core.setOutput("labels", JSON.stringify(labels));

      - name: Skip if no PR
        if: steps.pr.outputs.skip == 'true'
        run: echo "No PR found, skipping release" && exit 0

      - name: Skip check
        if: contains(fromJson(steps.pr.outputs.labels), 'skip')
        run: echo "Skipping release" && exit 0

      - uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          registry-url: 'https://registry.npmjs.org'

      - name: Install
        run: npm ci

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Determine beta
        id: beta
        run: |
          LABELS='${{ steps.pr.outputs.labels }}'

          if echo "$LABELS" | jq -e '.[] | select(. == "beta")' > /dev/null; then
            echo "is_beta=true" >> $GITHUB_OUTPUT
          else
            echo "is_beta=false" >> $GITHUB_OUTPUT
          fi

      - name: Build
        run: npm run build:lib

      - name: Bump version
        id: bump
        run: |
          CURRENT_VERSION=$(node -p "require('./package.json').version")
          echo "Current version: $CURRENT_VERSION"

          if [ "${{ steps.beta.outputs.is_beta }}" = "true" ]; then
            npm version prerelease --preid=beta -m "chore(release): bump version to %s"
          else
            npm version patch -m "chore(release): bump version to %s"
          fi

          NEW_VERSION=$(node -p "require('./package.json').version")
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: Push version bump
        run: git push origin HEAD:master --follow-tags

      - name: Publish Beta
        if: steps.beta.outputs.is_beta == 'true'
        run: |
          npm publish --tag beta --access public || echo "Already published"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish Stable
        if: steps.beta.outputs.is_beta == 'false'
        run: |
          npm publish --access public || echo "Already published"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Comment PR
        if: steps.pr.outputs.number != ''
        uses: actions/github-script@v7
        env:
          PR_NUMBER: ${{ steps.pr.outputs.number }}
        with:
          script: |
            const prNumber = Number(process.env.PR_NUMBER);
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: "🚀 Release completed"
            });